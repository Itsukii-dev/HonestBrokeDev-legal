<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honest Broke Dev — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff7ed;
      color: #2d3561;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .card {
      background: #fff;
      border: 2px solid #e8ecf8;
      border-radius: 20px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 0 #e8ecf8;
    }
    .label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #a0aacf;
      margin-bottom: 8px;
    }
    h1 { font-size: 26px; font-weight: 900; color: #2d3561; margin-bottom: 8px; }
    .sub { font-size: 13px; color: #7f8ab0; line-height: 1.6; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .links a {
      display: block;
      background: #f0f4ff;
      border: 1.5px solid #e8ecf8;
      border-radius: 12px;
      padding: 14px 18px;
      text-decoration: none;
      color: #2d3561;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.15s;
    }
    .links a:hover { background: #e8ecf8; }
    .links a span { font-size: 11px; display: block; font-weight: 400; color: #7f8ab0; margin-top: 2px; }
    .footer { margin-top: 28px; font-size: 11px; color: #a0aacf; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">documenti legali</p>
    <h1>Honest Broke Dev</h1>
    <p class="sub">un'app da €1 che mostra in tempo reale quanto guadagna chi l'ha fatta.</p>
    <div class="links">
      <a href="privacy.html">
        Informativa sulla Privacy
        <span>GDPR · aggiornata aprile 2025</span>
      </a>
      <a href="tos.html">
        Termini di Servizio
        <span>condizioni d'uso dell'app</span>
      </a>
    </div>
    <p class="footer">sviluppato da Itsukii Studio · com.honestbrokedev.app</p>
  </div>
</body>
</html>
